services:
  mongo:
    image: mongo:7
    container_name: appencuesta-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-encuestadb}
    volumes:
      - mongo-data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/01-init-db.js:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  javalin-app:
    build: .
    container_name: appencuesta-app
    restart: unless-stopped
    ports:
      - "${PUERTO:-7000}:${PUERTO:-7000}"
      - "${GRPC_PORT:-9090}:${GRPC_PORT:-9090}"
    environment:
      - PUERTO=${PUERTO:-7000}
      - GRPC_PORT=${GRPC_PORT:-9090}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-cambiar}
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-encuestadb}
    networks:
      - app-network
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PUERTO:-7000}/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
