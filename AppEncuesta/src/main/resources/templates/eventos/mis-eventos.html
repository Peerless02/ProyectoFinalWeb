<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventoz : Mis eventos</title>

    <link rel="shortcut icon" type="image/icon" href="/images/favicon.ico"/>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet">
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/slick.css" rel="stylesheet">
    <link id="switcher" href="/assets/css/theme-color/default-theme.css" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,400i,600,700,800" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
  </head>

  <body>
    <header id="mu-hero" role="banner">
      <nav class="navbar navbar-fixed-top navbar-default mu-navbar">
        <div class="container">
          <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#nav-my-events" aria-expanded="false">
              <span class="sr-only">Toggle navigation</span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="/index.html">Eventoz</a>
          </div>

          <div class="collapse navbar-collapse" id="nav-my-events">
            <ul class="nav navbar-nav mu-menu navbar-right">
              <li><a href="/eventos">Eventos</a></li>
              <li class="active"><a href="/eventos/mis-eventos">Mis eventos</a></li>
            </ul>
          </div>

          <ul class="nav navbar-nav mu-menu navbar-right" style="margin-right: 0;">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/logout">Log out</a></li>
          </ul>
        </div>
      </nav>

      <div class="mu-hero-overlay">
        <div class="container">
          <div class="mu-hero-area">
            <div class="mu-hero-featured-area">
              <div class="mu-hero-featured-content" style="padding-top: 120px; padding-bottom: 40px;">
                <h1>MIS EVENTOS</h1>
                <p class="mu-event-date-line">Gestion de eventos</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main role="main" style="padding-top: 20px;">
      <section id="mu-my-events">
        <div class="container">
          <div class="row">
            <div class="col-md-12">
              <div class="mu-title-area">
                <h2 class="mu-title">Eventos</h2>
                <p th:if="${usuario != null && usuario.rol != null}" th:text="${'Rol: ' + usuario.rol}">Rol</p>
              </div>
            </div>
          </div>

          <div class="row" style="margin-bottom: 15px;">
            <div class="col-sm-6">
              <div class="alert alert-info" th:if="${eventos == null || eventos.isEmpty()}">
                No hay eventos para mostrar.
              </div>
            </div>
            <div class="col-sm-6 text-right">
              <a class="btn btn-primary"
                 th:if="${usuario != null && usuario.rol != null && (usuario.rol == 'ADMIN' || usuario.rol == 'ORGANIZADOR')}"
                 href="/eventos/nuevo"><i class="fa fa-plus"></i> Crear evento</a>
            </div>
          </div>

          <div class="row" th:if="${eventos != null && !eventos.isEmpty()}">
            <div class="col-md-12">
              <div class="table-responsive">
                <table class="table table-striped table-bordered">
                  <thead>
                    <tr>
                      <th>Titulo</th>
                      <th>Fecha</th>
                      <th>Lugar</th>
                      <th>Estado</th>
                      <th style="width: 220px;">Acciones</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="e : ${eventos}">
                      <td><a th:href="@{/eventos/{id}(id=${e.id})}" th:text="${e.titulo}">Evento</a></td>
                      <td th:text="${e.fechaHora}">-</td>
                      <td th:text="${e.lugar}">-</td>
                      <td th:text="${e.estado}">-</td>
                      <td>
                        <form th:if="${usuario != null && usuario.rol != null && usuario.rol == 'ADMIN' && e.estado != null && e.estado.name() != 'PUBLICADO'}"
                              th:action="@{/eventos/{id}/publicar(id=${e.id})}"
                              method="post" style="display:inline">
                          <button class="btn btn-xs btn-success" type="submit">Publicar</button>
                        </form>
                        <form th:if="${usuario != null && usuario.rol != null && usuario.rol == 'ADMIN' && e.estado != null && e.estado.name() == 'PUBLICADO'}"
                              th:action="@{/eventos/{id}/despublicar(id=${e.id})}"
                              method="post" style="display:inline">
                          <button class="btn btn-xs btn-warning" type="submit">Despublicar</button>
                        </form>
                        <a class="btn btn-xs btn-default"
                           th:href="@{/eventos/{id}/editar(id=${e.id})}"
                           th:if="${usuario != null && usuario.rol != null && (usuario.rol == 'ADMIN' || (usuario.rol == 'ORGANIZADOR' && e.organizadorId != null && e.organizadorId == usuario.id))}">
                          Editar
                        </a>
                        <button class="btn btn-xs btn-danger"
                                th:if="${usuario != null && usuario.rol != null && (usuario.rol == 'ADMIN' || (usuario.rol == 'ORGANIZADOR' && e.organizadorId != null && e.organizadorId == usuario.id))}"
                                th:attr="data-id=${e.id}"
                                onclick="eliminarEvento(this)">
                          Eliminar
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      function eliminarEvento(btn) {
        var id = btn.getAttribute('data-id');
        if (!id) return;
        if (!confirm('Eliminar el evento ' + id + '?')) return;

        fetch('/eventos/' + id, { method: 'DELETE', credentials: 'same-origin' })
          .then(function (r) {
            if (r.redirected) { window.location.href = r.url; return; }
            if (r.status === 200 || r.status === 204) { window.location.reload(); return; }
            return r.text().then(function (t) { alert(t || 'No se pudo eliminar.'); });
          })
          .catch(function () { alert('No se pudo eliminar.'); });
      }
    </script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="/assets/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/assets/js/slick.min.js"></script>
    <script type="text/javascript" src="/assets/js/jquery.countdown.min.js"></script>
    <script type="text/javascript" src="/assets/js/custom.js"></script>
  </body>
</html>
