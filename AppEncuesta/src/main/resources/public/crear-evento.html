<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AppEncuesta : Nueva encuesta</title>

    <link rel="shortcut icon" type="image/icon" href="images/favicon.ico"/>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/slick.css" rel="stylesheet">
    <link id="switcher" href="assets/css/theme-color/default-theme.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,400i,600,700,800" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
  </head>

  <body>
    <header id="mu-hero" role="banner">
      <nav class="navbar navbar-fixed-top navbar-default mu-navbar">
        <div class="container">
          <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#nav-create" aria-expanded="false">
              <span class="sr-only">Toggle navigation</span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="index.html">AppEncuesta</a>
          </div>

          <div class="collapse navbar-collapse" id="nav-create">
            <ul class="nav navbar-nav mu-menu navbar-right">
              <li><a href="index.html">Inicio</a></li>
              <li class="active"><a href="crear-evento.html">Nueva encuesta</a></li>
              <li><a href="index.html#mu-formulario-list">Mis encuestas</a></li>
            </ul>
          </div>

          <ul class="nav navbar-nav navbar-right" style="margin-right:0;">
            <li style="padding: 15px 10px;">
              <span id="auth-badge" class="label label-default" style="display:none"></span>
            </li>
            <li><a href="javascript:void(0)" id="auth-button">Log in</a></li>
          </ul>
        </div>
      </nav>

      <div class="mu-hero-overlay">
        <div class="container">
          <div class="mu-hero-area">
            <div class="mu-hero-featured-area">
              <div class="mu-hero-featured-content" style="padding-top: 120px; padding-bottom: 40px;">
                <h1>NUEVA ENCUESTA</h1>
                <p class="mu-event-date-line">Registro de Formulario</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main role="main" style="padding-top: 20px;">
      <section id="mu-formulario-create" class="mu-section-pad">
        <div class="container">
          <div id="auth-gate" class="alert alert-warning" style="display:none">
            Necesitas iniciar sesion para registrar una encuesta.
          </div>

          <div class="row">
            <div class="col-md-10 col-md-offset-1">
              <div id="form-error" class="alert alert-danger" style="display:none"></div>
              <div id="form-success" class="alert alert-success" style="display:none"></div>

              <form id="formulario-form">
                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-nombre">Nombre</label>
                      <input type="text" class="form-control" id="form-nombre" maxlength="150" required>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-sector">Sector</label>
                      <input type="text" class="form-control" id="form-sector" maxlength="150" required>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-nivel">Nivel escolar</label>
                      <select class="form-control" id="form-nivel" required>
                        <option value="">Selecciona...</option>
                        <option value="BASICO">BASICO</option>
                        <option value="MEDIO">MEDIO</option>
                        <option value="GRADO_UNIVERSITARIO">GRADO_UNIVERSITARIO</option>
                        <option value="POSTGRADO">POSTGRADO</option>
                        <option value="DOCTORADO">DOCTORADO</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label>Ubicacion (opcional)</label>
                      <div class="row">
                        <div class="col-xs-6">
                          <input type="text" class="form-control" id="form-latitud" placeholder="Latitud">
                        </div>
                        <div class="col-xs-6">
                          <input type="text" class="form-control" id="form-longitud" placeholder="Longitud">
                        </div>
                      </div>
                      <div style="margin-top:10px;">
                        <button type="button" class="btn btn-default btn-sm" id="form-geo-btn">
                          <i class="fa fa-map-marker"></i> Obtener ubicacion
                        </button>
                        <span id="form-geo-msg" class="text-muted" style="margin-left:8px;"></span>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="form-group">
                  <label for="form-foto">Foto (opcional)</label>
                  <input type="file" id="form-foto" accept="image/*" class="form-control">
                  <input type="hidden" id="form-foto-base64">
                  <div id="form-photo-msg" class="text-muted" style="margin-top:6px;"></div>
                  <img id="form-foto-preview" class="mu-form-preview" src="" alt="preview" style="display:none">
                </div>

                <button type="submit" class="mu-send-msg-btn btn btn-primary" style="width:auto;">
                  <i class="fa fa-check"></i> Guardar encuesta
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Auth modal -->
    <div class="modal fade" id="authModal" tabindex="-1" role="dialog" aria-labelledby="authModalLabel">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
            <h4 class="modal-title" id="authModalLabel">Iniciar sesion</h4>
          </div>
          <div class="modal-body">
            <div id="auth-error" class="alert alert-danger" style="display:none"></div>
            <form id="login-form">
              <div class="form-group">
                <label for="login-username">Usuario</label>
                <input type="text" class="form-control" id="login-username" autocomplete="username" required>
              </div>
              <div class="form-group">
                <label for="login-password">Contrasena</label>
                <input type="password" class="form-control" id="login-password" autocomplete="current-password" required>
              </div>
              <button id="login-submit" type="submit" class="btn btn-primary">
                <i class="fa fa-sign-in"></i> Entrar
              </button>
            </form>
            <p class="text-muted" style="margin-top:10px;">
              Endpoint: <code>POST /api/auth/login</code>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Vendor (Bootstrap 3 requiere jQuery) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <!-- App -->
    <script src="js/models.js"></script>
    <script src="js/encuestas.js"></script>
  </body>
</html>
