<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AppEncuesta : Registrar encuesta</title>

    <link rel="shortcut icon" type="image/icon" href="images/favicon.ico"/>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">

    <link href="style.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,400i,600,700,800" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
  </head>

  <body>
    <header id="mu-hero" role="banner">
      <nav class="navbar navbar-fixed-top navbar-default mu-navbar">
        <div class="container">
          <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#nav-create" aria-expanded="false">
              <span class="sr-only">Toggle navigation</span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
              <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="index.html">AppEncuesta</a>
          </div>

          <div class="collapse navbar-collapse" id="nav-create">
            <ul class="nav navbar-nav mu-menu navbar-right">
              <li><a href="index.html">Inicio</a></li>
              <li class="active"><a href="encuesta.html">Registrar encuesta</a></li>
              <li><a href="index.html#mu-formulario-list">Mis encuestas</a></li>
            </ul>
          </div>

          <ul class="nav navbar-nav navbar-right" style="margin-right:0;">
            <li style="padding: 15px 10px;">
              <span id="auth-badge" class="label label-default" style="display:none"></span>
            </li>
            <li><a href="javascript:void(0)" id="auth-button">Log in</a></li>
          </ul>
        </div>
      </nav>

      <div class="mu-hero-overlay">
        <div class="container">
          <div class="mu-hero-area">
            <div class="mu-hero-featured-area">
              <div class="mu-hero-featured-content" style="padding-top: 120px; padding-bottom: 40px;">
                <h1>REGISTRAR ENCUESTA</h1>
                <p class="mu-event-date-line">Personal de campo: registro de encuestados</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main role="main" style="padding-top: 20px;">
      <section id="mu-formulario-create" class="mu-section-pad">
        <div class="container">
          <div id="auth-gate" class="alert alert-warning" style="display:none">
            Necesitas iniciar sesion para registrar una encuesta.
          </div>

          <div class="row">
            <div class="col-md-10 col-md-offset-1">
              <div id="form-error" class="alert alert-danger" style="display:none"></div>
              <div id="form-success" class="alert alert-success" style="display:none"></div>

              <form id="formulario-form">
                <input type="hidden" id="form-usuarioRegistro">

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-nombre">Nombre</label>
                      <input type="text" class="form-control" id="form-nombre" maxlength="150" required>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-sector">Sector</label>
                      <input type="text" class="form-control" id="form-sector" maxlength="150" required>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label for="form-nivel">Nivel escolar</label>
                      <select class="form-control" id="form-nivel" required>
                        <option value="">Selecciona...</option>
                        <option value="BASICO">BASICO</option>
                        <option value="MEDIO">MEDIO</option>
                        <option value="GRADO_UNIVERSITARIO">GRADO_UNIVERSITARIO</option>
                        <option value="POSTGRADO">POSTGRADO</option>
                        <option value="DOCTORADO">DOCTORADO</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-sm-6">
                    <div class="form-group">
                      <label>GPS</label>
                      <div>
                        <small id="gps-status" class="text-muted">📍 Obteniendo ubicacion...</small>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="form-group">
                  <label>Foto (opcional)</label>
                  <div class="row">
                    <div class="col-sm-6" style="margin-bottom:8px;">
                      <button type="button" class="btn btn-default" id="btn-tomar-foto">
                        <i class="fa fa-camera"></i> Tomar foto
                      </button>
                      <input type="file" id="input-foto-camara" accept="image/*" capture="environment" style="display:none">
                    </div>
                    <div class="col-sm-6" style="margin-bottom:8px;">
                      <button type="button" class="btn btn-default" id="btn-subir-foto">
                        <i class="fa fa-upload"></i> Subir desde galeria
                      </button>
                      <input type="file" id="input-foto-galeria" accept="image/*" style="display:none">
                    </div>
                  </div>
                  <div id="form-photo-msg" class="text-muted" style="margin-top:6px;"></div>
                  <img id="form-foto-preview" class="mu-form-preview" src="" alt="preview" style="display:none">
                </div>

                <!-- CAMPOS EXTRA: aquí se inyectarán dinámicamente los campos adicionales
                     de la plantilla seleccionada por el administrador -->
                <div id="campos-extra"></div>

                <div style="margin-top: 12px;">
                  <button type="submit" class="mu-send-msg-btn btn btn-primary" style="width:auto;">
                    <i class="fa fa-check"></i> Guardar encuesta
                  </button>
                  <button type="button" class="btn btn-warning" id="sync-pendientes" style="display:none; margin-left:8px;">
                    <i class="fa fa-refresh"></i> Sincronizar pendientes
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Auth modal -->
    <div class="modal fade" id="authModal" tabindex="-1" role="dialog" aria-labelledby="authModalLabel">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
            <h4 class="modal-title" id="authModalLabel">Iniciar sesion</h4>
          </div>
          <div class="modal-body">
            <div id="auth-error" class="alert alert-danger" style="display:none"></div>
            <form id="login-form">
              <div class="form-group">
                <label for="login-username">Usuario</label>
                <input type="text" class="form-control" id="login-username" autocomplete="username" required>
              </div>
              <div class="form-group">
                <label for="login-password">Contrasena</label>
                <input type="password" class="form-control" id="login-password" autocomplete="current-password" required>
              </div>
              <button id="login-submit" type="submit" class="btn btn-primary">
                <i class="fa fa-sign-in"></i> Entrar
              </button>
            </form>
            <p class="text-muted" style="margin-top:10px;">
              Endpoint: <code>POST /api/auth/login</code>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Vendor (Bootstrap 3 requiere jQuery) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script>
      (function () {
        'use strict';

        var LS_AUTH = 'appencuesta.auth';
        var LS_PENDIENTES = 'encuestas_pendientes';

        var gpsLat = null;
        var gpsLng = null;
        var fotoBase64 = null;

        function $(id) { return document.getElementById(id); }

        function show(el, on) {
          if (!el) return;
          el.style.display = on ? '' : 'none';
        }

        function setText(el, txt) {
          if (!el) return;
          el.textContent = txt == null ? '' : String(txt);
        }

        function b64UrlDecode(s) {
          var b64 = String(s).replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var bin = atob(b64);
          var bytes = new Uint8Array(bin.length);
          for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
          try { return new TextDecoder('utf-8').decode(bytes); } catch (e) { return bin; }
        }

        function parseJwt(token) {
          try {
            var parts = String(token || '').split('.');
            if (parts.length < 2) return null;
            return JSON.parse(b64UrlDecode(parts[1]));
          } catch (e) {
            return null;
          }
        }

        function nowSeconds() { return Math.floor(Date.now() / 1000); }

        function getAuthTokenRaw() {
          // Primary: same storage as the rest of the app (encuestas.js).
          try {
            var raw = localStorage.getItem(LS_AUTH);
            if (raw) {
              var obj = JSON.parse(raw);
              if (obj && obj.token) return obj.token;
            }
          } catch (e) {}

          // Fallbacks (if another page stored it differently).
          var direct = localStorage.getItem('token');
          return direct || null;
        }

        function clearAuth() {
          localStorage.removeItem(LS_AUTH);
          localStorage.removeItem('token');
        }

        function getAuth() {
          var token = getAuthTokenRaw();
          if (!token) return null;
          var payload = parseJwt(token);
          if (!payload || !payload.sub) return null;
          if (payload.exp && payload.exp <= nowSeconds()) return null;
          return { token: token, username: payload.sub, rol: payload.rol || payload.role || null, exp: payload.exp || null };
        }

        function setAuth(token) {
          localStorage.setItem(LS_AUTH, JSON.stringify({ token: token }));
        }

        function showLoginModal() {
          if (window.$ && $('#authModal').modal) {
            $('#authModal').modal('show');
            return;
          }
          var modal = $('authModal');
          if (modal) modal.style.display = 'block';
        }

        function hideLoginModal() {
          if (window.$ && $('#authModal').modal) {
            $('#authModal').modal('hide');
            return;
          }
          var modal = $('authModal');
          if (modal) modal.style.display = 'none';
        }

        function setLoginError(msg) {
          var el = $('auth-error');
          setText(el, msg || '');
          show(el, !!msg);
        }

        function login(username, password) {
          return fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
          }).then(function (r) {
            if (!r.ok) return r.json().catch(function () { return {}; }).then(function (d) {
              var msg = (d && d.error) ? d.error : ('No se pudo iniciar sesion. (' + r.status + ')');
              throw new Error(msg);
            });
            return r.json();
          }).then(function (data) {
            if (!data || !data.token) throw new Error('Respuesta invalida del servidor.');
            setAuth(data.token);
          });
        }

        function renderAuth() {
          var auth = getAuth();
          var btn = $('auth-button');
          var badge = $('auth-badge');

          if (btn) btn.textContent = auth ? 'Log out' : 'Log in';
          if (badge) {
            show(badge, !!auth);
            if (auth) setText(badge, auth.username + (auth.rol ? (' (' + auth.rol + ')') : ''));
          }

          var gate = $('auth-gate');
          if (gate) show(gate, !auth);

          var createWrap = $('mu-formulario-create');
          if (createWrap) show(createWrap, !!auth);

          var userHidden = $('form-usuarioRegistro');
          if (userHidden) userHidden.value = auth ? auth.username : '';
        }

        function readPendientes() {
          try {
            var raw = localStorage.getItem(LS_PENDIENTES);
            var arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? arr : [];
          } catch (e) {
            return [];
          }
        }

        function writePendientes(arr) {
          localStorage.setItem(LS_PENDIENTES, JSON.stringify(arr || []));
        }

        function hasNoSincronizados() {
          var arr = readPendientes();
          for (var i = 0; i < arr.length; i++) {
            if (!arr[i] || arr[i].sincronizado !== true) return true;
          }
          return false;
        }

        function refreshSyncButton() {
          show($('sync-pendientes'), hasNoSincronizados());
        }

        function setFormError(msg) {
          var el = $('form-error');
          setText(el, msg || '');
          show(el, !!msg);
        }

        function setFormSuccess(msg) {
          var el = $('form-success');
          setText(el, msg || '');
          show(el, !!msg);
        }

        function gpsSetStatus(txt, kind) {
          // kind: 'ok' | 'warn' | null
          var el = $('gps-status');
          if (!el) return;
          setText(el, txt);
          el.className = (kind === 'ok') ? 'text-success' : (kind === 'warn') ? 'text-warning' : 'text-muted';
        }

        function startGps() {
          if (!navigator.geolocation) {
            gpsLat = null;
            gpsLng = null;
            gpsSetStatus('⚠️ Sin ubicacion', 'warn');
            return;
          }

          gpsSetStatus('📍 Obteniendo ubicacion...', null);
          navigator.geolocation.getCurrentPosition(function (pos) {
            gpsLat = (pos && pos.coords) ? pos.coords.latitude : null;
            gpsLng = (pos && pos.coords) ? pos.coords.longitude : null;
            if (gpsLat == null || gpsLng == null) {
              gpsLat = null;
              gpsLng = null;
              gpsSetStatus('⚠️ Sin ubicacion', 'warn');
              return;
            }
            gpsSetStatus('📍 Ubicacion capturada', 'ok');
          }, function () {
            gpsLat = null;
            gpsLng = null;
            gpsSetStatus('⚠️ Sin ubicacion', 'warn');
          }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
        }

        function readFileAsDataUrl(file) {
          return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result); };
            reader.onerror = function () { reject(new Error('No se pudo leer la imagen.')); };
            reader.readAsDataURL(file);
          });
        }

        function setPreview(dataUrl) {
          var img = $('form-foto-preview');
          if (!img) return;
          if (!dataUrl) {
            img.src = '';
            show(img, false);
            return;
          }
          img.src = dataUrl;
          show(img, true);
        }

        function handleImageSelection(file) {
          setText($('form-photo-msg'), '');
          if (!file) {
            fotoBase64 = null;
            setPreview(null);
            return;
          }
          if (file.size > 2 * 1024 * 1024) {
            setText($('form-photo-msg'), 'La foto supera 2MB. Usa una imagen mas pequena.');
            fotoBase64 = null;
            setPreview(null);
            return;
          }
          readFileAsDataUrl(file).then(function (dataUrl) {
            fotoBase64 = (typeof dataUrl === 'string') ? dataUrl : null;
            setPreview(fotoBase64);
          }).catch(function () {
            setText($('form-photo-msg'), 'No se pudo procesar la imagen.');
            fotoBase64 = null;
            setPreview(null);
          });
        }

        function buildPayload() {
          var auth = getAuth();
          if (!auth) return null;

          var nombre = ($('form-nombre') && $('form-nombre').value) ? $('form-nombre').value.trim() : '';
          var sector = ($('form-sector') && $('form-sector').value) ? $('form-sector').value.trim() : '';
          var nivel = ($('form-nivel') && $('form-nivel').value) ? $('form-nivel').value : '';

          if (!nombre || !sector || !nivel) return null;

          return {
            nombre: nombre,
            sector: sector,
            nivelEscolar: nivel,
            usuarioRegistro: auth.username, // JWT claim "sub"
            latitud: (typeof gpsLat === 'number') ? gpsLat : null,
            longitud: (typeof gpsLng === 'number') ? gpsLng : null,
            fotoBase64: (typeof fotoBase64 === 'string' && fotoBase64) ? fotoBase64 : null,
            camposExtra: {}
          };
        }

        function makeLocalId() {
          return 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        }

        function savePending(payload) {
          var item = { idLocal: makeLocalId(), payload: payload, sincronizado: false, creadoEn: new Date().toISOString() };
          var arr = readPendientes();
          arr.push(item);
          writePendientes(arr);
          refreshSyncButton();
          return item;
        }

        function markSynced(idLocal, serverData) {
          var arr = readPendientes();
          for (var i = 0; i < arr.length; i++) {
            if (arr[i] && String(arr[i].idLocal) === String(idLocal)) {
              arr[i].sincronizado = true;
              arr[i].sincronizadoEn = new Date().toISOString();
              if (serverData && serverData.id) arr[i].idServidor = serverData.id;
              break;
            }
          }
          writePendientes(arr);
          refreshSyncButton();
        }

        function postFormulario(payload) {
          var auth = getAuth();
          if (!auth) return Promise.reject(new Error('No autenticado.'));

          return fetch('/api/formularios', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + auth.token
            },
            body: JSON.stringify(payload)
          }).then(function (r) {
            if (r.status === 201) return r.json().catch(function () { return {}; });
            return r.json().catch(function () { return {}; }).then(function (d) {
              var msg = (d && d.error) ? d.error : ('Error al guardar. (' + r.status + ')');
              var err = new Error(msg);
              err.status = r.status;
              throw err;
            });
          });
        }

        function syncPendientes() {
          var auth = getAuth();
          if (!auth) {
            showLoginModal();
            return Promise.resolve();
          }

          var btn = $('sync-pendientes');
          if (btn) btn.disabled = true;

          var arr = readPendientes();
          var pend = arr.filter(function (x) { return x && x.sincronizado !== true && x.payload; });
          if (pend.length === 0) {
            refreshSyncButton();
            if (btn) btn.disabled = false;
            return Promise.resolve();
          }

          var okCount = 0;
          var failCount = 0;
          var lastErr = null;

          // Sync sequentially to avoid bursts and to keep behavior predictable offline.
          var chain = Promise.resolve();
          pend.forEach(function (item) {
            chain = chain.then(function () {
              return postFormulario(item.payload).then(function (serverData) {
                okCount++;
                markSynced(item.idLocal, serverData);
              }).catch(function (err) {
                failCount++;
                lastErr = err || lastErr;
                // Stop on first failure to keep behavior predictable (offline or auth/server errors).
                throw err || new Error('sync-stop');
              });
            });
          });

          return chain.catch(function () {
            // ignore; message below
          }).finally(function () {
            if (btn) btn.disabled = false;
            refreshSyncButton();
            if (okCount > 0 && failCount === 0) {
              setFormSuccess('Sincronizacion completa. (' + okCount + ')');
              setTimeout(function () { show($('form-success'), false); }, 2500);
            } else if (okCount > 0 && failCount > 0) {
              setFormSuccess('Sincronizado parcialmente. (' + okCount + ') Pendientes aun sin conexion.');
              setTimeout(function () { show($('form-success'), false); }, 3500);
            } else if (failCount > 0) {
              if (lastErr && typeof lastErr.status === 'number') {
                if (lastErr.status === 401 || lastErr.status === 403) {
                  setFormError('Necesitas iniciar sesion nuevamente para sincronizar.');
                  showLoginModal();
                } else {
                  setFormError(lastErr.message || 'No se pudo sincronizar ahora.');
                }
              } else {
                setFormSuccess('Guardado localmente. Se sincronizara cuando haya conexion.');
                setTimeout(function () { show($('form-success'), false); }, 3500);
              }
            }
          });
        }

        function wireAuth() {
          var authBtn = $('auth-button');
          var loginForm = $('login-form');

          if (authBtn) {
            authBtn.addEventListener('click', function () {
              var auth = getAuth();
              if (auth) {
                clearAuth();
                renderAuth();
                showLoginModal();
                return;
              }
              setLoginError('');
              showLoginModal();
            });
          }

          if (loginForm) {
            loginForm.addEventListener('submit', function (e) {
              e.preventDefault();
              setLoginError('');
              var u = $('login-username');
              var p = $('login-password');
              var username = u ? u.value.trim() : '';
              var password = p ? p.value : '';
              if (!username || !password) {
                setLoginError('Completa usuario y contrasena.');
                return;
              }
              var btn = $('login-submit');
              if (btn) btn.disabled = true;
              login(username, password)
                .then(function () {
                  hideLoginModal();
                  renderAuth();
                })
                .catch(function (err) {
                  setLoginError(err && err.message ? err.message : 'No se pudo iniciar sesion.');
                })
                .finally(function () {
                  if (btn) btn.disabled = false;
                });
            });
          }
        }

        function wirePhoto() {
          var btnCam = $('btn-tomar-foto');
          var btnGal = $('btn-subir-foto');
          var inCam = $('input-foto-camara');
          var inGal = $('input-foto-galeria');

          if (btnCam && inCam) btnCam.addEventListener('click', function () { inCam.click(); });
          if (btnGal && inGal) btnGal.addEventListener('click', function () { inGal.click(); });

          if (inCam) {
            inCam.addEventListener('change', function () {
              var file = (inCam.files && inCam.files.length) ? inCam.files[0] : null;
              handleImageSelection(file);
              inCam.value = '';
            });
          }

          if (inGal) {
            inGal.addEventListener('change', function () {
              var file = (inGal.files && inGal.files.length) ? inGal.files[0] : null;
              handleImageSelection(file);
              inGal.value = '';
            });
          }
        }

        function wireCreate() {
          var form = $('formulario-form');
          if (!form) return;

          form.addEventListener('submit', function (e) {
            e.preventDefault();
            setFormError('');
            setFormSuccess('');

            var auth = getAuth();
            if (!auth) {
              showLoginModal();
              return;
            }

            var payload = buildPayload();
            if (!payload) {
              setFormError('Completa nombre, sector y nivel escolar.');
              return;
            }

            // Requerimiento #8: guardar local antes de sincronizar.
            var pending = savePending(payload);

            var submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            postFormulario(payload).then(function (serverData) {
              markSynced(pending.idLocal, serverData);
              setFormSuccess('Encuesta sincronizada.');
              setTimeout(function () { show($('form-success'), false); }, 2500);
            }).catch(function (err) {
              // Si es un error HTTP (servidor respondio), mostrarlo. Si es offline, mensaje de sincronizacion.
              if (err && typeof err.status === 'number') {
                setFormError((err.message || 'No se pudo sincronizar ahora.') + ' Se guardo localmente como pendiente.');
              } else {
                setFormSuccess('Guardado localmente. Se sincronizara cuando haya conexion.');
                setTimeout(function () { show($('form-success'), false); }, 3500);
              }
            }).finally(function () {
              if (submitBtn) submitBtn.disabled = false;
              form.reset();
              fotoBase64 = null;
              setPreview(null);
              refreshSyncButton();
            });
          });
        }

        document.addEventListener('DOMContentLoaded', function () {
          // If auth is invalid/expired, drop it.
          if (!getAuth()) clearAuth();

          wireAuth();
          wirePhoto();
          wireCreate();

          $('sync-pendientes').addEventListener('click', function () {
            setFormError('');
            setFormSuccess('');
            syncPendientes();
          });

          renderAuth();
          refreshSyncButton();
          startGps();

          if (!getAuth()) {
            showLoginModal();
          }
        });
      })();
    </script>
